<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp 2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- agria -->
    <div id="auth-screen" class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">💬</div>
            <h2>Iniciar Sesión en WhatsApp 2</h2>
            <p>Ingrese sus datos para ingresar</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="auth-email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="auth-password" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <div class="input-group" id="group-username" style="display: none;">
                    <label>Nombre de Usuario (Solo para nuevos)</label>
                    <input type="text" id="auth-username" placeholder="Tu Nickname">
                </div>

                <div class="auth-buttons">
                    <button type="submit" id="btn-login">Ingresar</button>
                    <button type="button" id="btn-toggle-registro">¿No tienes cuenta? Regístrate</button>
                </div>
            </form>
        </div>
    </div>

    <div class="whatsapp-container" id="app-container" style="display: none;">
        
        <div class="sidebar-chats">
            <div class="header-perfil">
                <div class="avatar">👤</div>
                <span id="label-mi-nombre">Conectando...</span>
                <div class="perfil-acciones">
                    <button id="btn-toggle-tema" title="Cambiar Tema">🌙</button>
                    <button id="btn-logout" title="Cerrar Sesión">Cerrar Sesión</button>
                </div>
            </div>

            <div class="search-chats-box">
                <input type="text" id="input-busqueda" placeholder="🔍 Buscar en el historial de este chat...">
            </div>

            <div class="lista-conversaciones">
                <div class="chat-item activo" data-canal="general">
                    <div class="chat-icon">👥</div>
                    <div class="chat-info">
                        <h3>🟢 Grupo General</h3>
                        <p>Sala principal de conversación</p>
                    </div>
                </div>
                
                <div class="chat-item" data-canal="archivos">
                    <div class="chat-icon">📁</div>
                    <div class="chat-info">
                        <h3>📁 Repositorio Archivos</h3>
                        <p>Imágenes y documentos adjuntos</p>
                    </div>
                </div>
                
                <div class="chat-item" data-canal=".">
                    <div class="chat-icon">💬</div>
                    <div class="chat-info">
                        <h3># Sala de Pruebas (.)</h3>
                        <p>Canal libre / Sandbox</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-window">
            <div class="chat-window-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="chat-icon" id="header-group-icon">👥</div>
                    <div class="header-info">
                        <h3 id="txt-canal-actual">Grupo General</h3>
                        <span>En línea</span>
                    </div>
                </div>
                <div class="header-der">
                    <button id="btn-google-nav" title="Buscador Integrado">🔍 Google</button>
                </div>
            </div>

            <div id="chat-container">
                <div id="google-search-panel" style="display: none;">
                    <div class="google-panel-header">
                        <span>🧭 Busqueda rapida en la web</span>
                        <button id="btn-cerrar-google">❌</button>
                    </div>
                    <iframe id="iframe-google" src="https://www.bing.com/search?q="></iframe>
                </div>
                
                <div id="chat-mensajes"></div>
                <div id="emoji-picker-container" style="display: none;"></div>
            </div>

            <form name="message" action="" id="form-container">
                <input type="file" id="input-archivo" style="display: none;" />
                <button type="button" id="btn-adjuntar" title="Adjuntar archivo">📎</button>
                <button type="button" id="btn-emoji" title="Insertar Emoji">😀</button>
                <input name="usermsg" type="text" id="input-mensaje" autocomplete="off" placeholder="Escribe un mensaje..." required />
                <button type="submit">Enviar</button>
            </form>
        </div> 
    </div>

    <audio id="sonido-notificacion" src="dragon-studio-new-notification-3-398649.mp3" preload="auto"></audio>    
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.6.0/dist/browser.js"></script>
    <script src="chat.js"></script>
</body>
</html>
